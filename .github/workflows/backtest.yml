name: K-Minervini Backtest Execution

# 언제 실행할지 정의합니다.
on:
  workflow_dispatch: # 깃허브 웹사이트에서 수동으로 'Run workflow' 버튼을 눌러 실행 가능하게 합니다.
  schedule:
    - cron: '0 9 * * 1-5' # (선택사항) 평일(월~금) 한국 시간 오후 6시(UTC 9시)에 자동 실행

jobs:
  run-backtest-job:
    runs-on: ubuntu-latest # 깃허브가 제공하는 가상 리눅스 컴퓨터를 빌립니다.

    steps:
    # 1. 깃허브 저장소에 있는 내 파이썬 코드를 가상 컴퓨터로 가져옵니다.
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. 가상 컴퓨터에 파이썬을 설치합니다.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 백테스트에 필요한 핵심 라이브러리들을 설치합니다.
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy pykrx requests

    # 4. 백테스트 스크립트를 실행합니다.
    # 텔레그램 알림을 받으시려면 아래 env 설정에 암호화된 토큰을 연동해야 합니다.
    - name: Run Backtest Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        python backtest.py # 실행할 파이썬 파일명으로 수정하세요 (예: korea_minervini.py)
