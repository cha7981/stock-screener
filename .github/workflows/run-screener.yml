name: Minervini Screener V11.3

on:
  workflow_dispatch:

  schedule:
    - cron: "30 22 * * 1-5"

jobs:
  run-screener:
    runs-on: ubuntu-24.04

    timeout-minutes: 45

    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Seoul

      ACCOUNT_SIZE: "100000"
      ACCOUNT_RISK_PCT: "0.005"
      MAX_POSITION_PCT: "0.15"

      TOP_TELEGRAM_COUNT: "10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          python -c "
          import yfinance
          import pandas

          print('yfinance', yfinance.__version__)
          print('pandas', pandas.__version__)
          "

      - name: Check Python syntax
        run: |
          python -m py_compile screener.py

      - name: Run Minervini screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python screener.py

      - name: Upload results and error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minervini-result

          path: |
            *.csv
            *.txt
            screener_error_log.txt

          if-no-files-found: warn
          retention-days: 30
